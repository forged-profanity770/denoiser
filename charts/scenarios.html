<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLI Denoiser - Scenario Deep Dives</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #F5F5F7;
    font-family: 'Geist Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #141414;
    border: 1px solid rgba(255,255,255,0.06);
    border-top: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 24px;
    position: relative;
  }
  .card h2 {
    font-size: 15px;
    font-weight: 600;
    color: #F5F5F7;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .card .kind {
    font-size: 11px;
    color: rgba(245,245,247,0.45);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .stat-box {
    flex: 1;
    background: #1E1E1E;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .val {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-box .lbl {
    font-size: 10px;
    color: rgba(245,245,247,0.45);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .green { color: #00DC82; }
  .blue { color: #0070F3; }
  .amber { color: #FFAA00; }
  .badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(0,220,130,0.1);
    color: #00DC82;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    letter-spacing: 0.02em;
  }
  canvas { max-height: 160px; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>

<script>
const scenarios = [
  {
    name: "cargo build",
    kind: "69 crates compiled",
    original: 231,
    filtered: 17,
    savings: 92.6,
    description: "Compiling/Checking/Fresh per-crate lines collapsed to [compiled 69 crates]",
    badge: "BEST",
    colors: { bar: '#00DC82', bg: 'rgba(0,220,130,0.15)' }
  },
  {
    name: "git clone",
    kind: "verbose transfer stats",
    original: 85,
    filtered: 8,
    savings: 90.6,
    description: "Enumerating/Counting/Compressing objects stripped, branch info preserved",
    badge: "90%+",
    colors: { bar: '#0070F3', bg: 'rgba(0,112,243,0.15)' }
  },
  {
    name: "docker pull",
    kind: "multi-layer image",
    original: 116,
    filtered: 23,
    savings: 80.2,
    description: "Per-layer Pulling/Downloading/Extracting collapsed to [pulled N layers]",
    badge: "80%+",
    colors: { bar: '#7C6AEF', bg: 'rgba(124,106,239,0.15)' }
  },
  {
    name: "npm install",
    kind: "deprecation warnings",
    original: 249,
    filtered: 63,
    savings: 74.7,
    description: "Deprecation warnings and peer dependency noise collapsed with counts",
    badge: "74%+",
    colors: { bar: '#FFAA00', bg: 'rgba(255,170,0,0.15)' }
  }
];

const grid = document.getElementById('grid');

scenarios.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="badge">${s.badge}</div>
    <h2>${s.name}</h2>
    <div class="kind">${s.kind}</div>
    <div class="stats">
      <div class="stat-box">
        <div class="val green">${s.savings}%</div>
        <div class="lbl">Savings</div>
      </div>
      <div class="stat-box">
        <div class="val blue">${s.original}</div>
        <div class="lbl">Original</div>
      </div>
      <div class="stat-box">
        <div class="val amber">${s.filtered}</div>
        <div class="lbl">After</div>
      </div>
    </div>
    <canvas id="chart-${i}"></canvas>
  `;
  grid.appendChild(card);

  setTimeout(() => {
    new Chart(document.getElementById(`chart-${i}`), {
      type: 'bar',
      data: {
        labels: ['Original', 'Filtered'],
        datasets: [{
          data: [s.original, s.filtered],
          backgroundColor: ['#333', s.colors.bar],
          borderRadius: 6,
          barPercentage: 0.6,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            max: Math.ceil(s.original * 1.1),
            ticks: { color: 'rgba(245,245,247,0.45)', font: { size: 10 } },
            grid: { color: 'rgba(255,255,255,0.04)' },
            border: { display: false }
          },
          y: {
            ticks: { color: 'rgba(245,245,247,0.7)', font: { size: 11, weight: 500 } },
            grid: { display: false },
            border: { display: false }
          }
        }
      }
    });
  }, 50);
});
</script>
</body>
</html>
