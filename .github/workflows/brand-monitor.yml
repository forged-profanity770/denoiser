name: Brand Monitor

on:
  schedule:
    # Every Monday and Thursday at 9 AM UTC
    - cron: "0 9 * * 1,4"
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Search for brand impersonation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Brand terms to monitor (repos and users/orgs containing these)
          BRAND_TERMS=("orellius" "orelliusai" "orellius-ai" "orellius-dome" "baserunner")
          LEGIT_OWNER="Orellius"
          ALERT_FILE=$(mktemp)
          FOUND=0

          for BRAND in "${BRAND_TERMS[@]}"; do
            echo "Scanning for '$BRAND'..."

            # Search repos with brand name, exclude legitimate owner
            RESULTS=$(gh api "search/repositories?q=${BRAND}+in:name+-owner:${LEGIT_OWNER}&per_page=100" \
              --jq '.items[] | "\(.full_name) | \(.html_url) | stars:\(.stargazers_count) | created:\(.created_at) | \(.description // "no description")"' \
              2>/dev/null || echo "")

            if [ -n "$RESULTS" ]; then
              while IFS= read -r line; do
                # Deduplicate across brand terms
                if ! grep -qF "$line" "$ALERT_FILE" 2>/dev/null; then
                  FOUND=$((FOUND + 1))
                  echo "$line" >> "$ALERT_FILE"
                fi
              done <<< "$RESULTS"
            fi

            # Search users and orgs containing the brand name
            USER_RESULTS=$(gh api "search/users?q=${BRAND}+in:login&per_page=50" \
              --jq '.items[] | select(.login != "'"${LEGIT_OWNER}"'") | "\(.login) | https://github.com/\(.login) | type:\(.type)"' \
              2>/dev/null || echo "")

            if [ -n "$USER_RESULTS" ]; then
              while IFS= read -r line; do
                if ! grep -qF "$line" "$ALERT_FILE" 2>/dev/null; then
                  FOUND=$((FOUND + 1))
                  echo "$line" >> "$ALERT_FILE"
                fi
              done <<< "$USER_RESULTS"
            fi
          done

          echo "Found $FOUND potential impersonation(s) across ${#BRAND_TERMS[@]} brand terms"

          if [ "$FOUND" -gt 0 ]; then
            BODY="## Brand Impersonation Alert

          **$FOUND** repository/user/organization(s) found matching protected brand terms:

          **Monitored terms:** ${BRAND_TERMS[*]}

          | Name | URL | Details |
          |---|---|---|
          $(awk -F' \\| ' '{print "| " $1 " | " $2 " | " $3 " " $4 " |"}' "$ALERT_FILE")

          ### Action Required
          1. Check each entry for malware/impersonation
          2. Report repos via [GitHub Abuse Form](https://support.github.com/contact/report-abuse)
          3. Report users via [GitHub Abuse Form](https://support.github.com/contact/report-abuse)
          4. For trademark violations, use [DMCA Takedown](https://support.github.com/contact/dmca-takedown)

          *Auto-generated by Brand Monitor workflow*"

            # Create issue
            gh api "repos/${GITHUB_REPOSITORY}/issues" \
              -f title="[Brand Monitor] $FOUND potential impersonation(s) detected - $(date +%Y-%m-%d)" \
              -f body="$BODY" \
              -f "labels[]=brand-monitor"
          else
            echo "No impersonation detected. All clear."
          fi

          rm -f "$ALERT_FILE"
