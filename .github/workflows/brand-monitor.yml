name: Brand Monitor

on:
  schedule:
    # Every Monday and Thursday at 9 AM UTC
    - cron: "0 9 * * 1,4"
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Search for brand impersonation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRAND="orellius"
          LEGIT_OWNER="Orellius"
          ALERT_FILE=$(mktemp)
          FOUND=0

          echo "Scanning GitHub for repos impersonating '$BRAND'..."

          # Search repos with brand name, exclude legitimate owner
          RESULTS=$(gh api "search/repositories?q=${BRAND}+in:name+-owner:${LEGIT_OWNER}&per_page=100" \
            --jq '.items[] | "\(.full_name) | \(.html_url) | stars:\(.stargazers_count) | created:\(.created_at) | \(.description // "no description")"' \
            2>/dev/null || echo "")

          if [ -n "$RESULTS" ]; then
            while IFS= read -r line; do
              FOUND=$((FOUND + 1))
              echo "$line" >> "$ALERT_FILE"
            done <<< "$RESULTS"
          fi

          # Also search for org names containing the brand
          ORG_RESULTS=$(gh api "search/users?q=${BRAND}+type:org+-${LEGIT_OWNER}&per_page=50" \
            --jq '.items[] | select(.login != "'"${LEGIT_OWNER}"'") | "\(.login) | https://github.com/\(.login) | type:org"' \
            2>/dev/null || echo "")

          if [ -n "$ORG_RESULTS" ]; then
            while IFS= read -r line; do
              FOUND=$((FOUND + 1))
              echo "$line" >> "$ALERT_FILE"
            done <<< "$ORG_RESULTS"
          fi

          echo "Found $FOUND potential impersonation(s)"

          if [ "$FOUND" -gt 0 ]; then
            BODY="## Brand Impersonation Alert

          **$FOUND** repository/organization(s) found using the '$BRAND' name:

          | Repository | URL | Details |
          |---|---|---|
          $(awk -F' \\| ' '{print "| " $1 " | " $2 " | " $3 " " $4 " |"}' "$ALERT_FILE")

          ### Action Required
          1. Check each repo for malware/impersonation
          2. Report via [GitHub Abuse Form](https://support.github.com/contact/report-abuse)
          3. For trademark violations, use [DMCA Takedown](https://support.github.com/contact/dmca-takedown)

          *Auto-generated by Brand Monitor workflow*"

            # Create issue
            gh api repos/${GITHUB_REPOSITORY}/issues \
              -f title="[Brand Monitor] $FOUND potential impersonation(s) detected - $(date +%Y-%m-%d)" \
              -f body="$BODY" \
              -f "labels[]=brand-monitor"
          else
            echo "No impersonation detected. All clear."
          fi

          rm -f "$ALERT_FILE"
